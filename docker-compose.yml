services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4646:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      WIZARD_BACKEND_URL: ${WIZARD_BACKEND_URL:-http://localhost:4646}
    ports:
      - "4545:80"
    depends_on:
      - backend
    restart: unless-stopped
